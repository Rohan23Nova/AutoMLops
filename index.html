<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium Iris Classification ML API Interface">
    <title>Iris Classification Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030305;
            --card-bg: rgba(18, 18, 20, 0.65);
            --border-glow: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --input-bg: rgba(255, 255, 255, 0.03);
            --input-border: rgba(255, 255, 255, 0.08);
            --input-focus-border: #6366f1;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --error: #f87171;
            --success: #34d399;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background Orbs for Premium Ambient Glow */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }
        
        .orb-1 {
            width: 450px;
            height: 450px;
            background: rgba(99, 102, 241, 0.25); /* Indigo glow */
            top: -10%;
            left: -5%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 550px;
            height: 550px;
            background: rgba(168, 85, 247, 0.2); /* Purple glow */
            bottom: -15%;
            right: -10%;
            animation-delay: -5s;
        }
        
        .orb-3 {
            width: 400px;
            height: 400px;
            background: rgba(45, 212, 191, 0.15); /* Teal glow */
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 40px) scale(1.05); }
            100% { transform: translate(-40px, 30px) scale(0.95); }
        }

        .container {
            width: 100%;
            max-width: 540px;
            z-index: 10;
        }

        /* Enhanced Glassmorphism Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--border-glow);
            border-radius: 32px;
            padding: 3.5rem;
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.1),
                0 24px 48px 8px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.08); /* Inner shine */
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .badge {
            display: inline-block;
            padding: 0.4rem 1.1rem;
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #a5b4fc;
            margin-bottom: 1.25rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
        }

        .header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
            letter-spacing: -0.04em;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.5;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 1.25rem;
        }

        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }
            .card {
                padding: 2.5rem 1.5rem;
                border-radius: 24px;
            }
        }

        .form-group {
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 1.1rem;
            width: 1.2rem;
            height: 1.2rem;
            color: rgba(255, 255, 255, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 16px;
            padding: 1rem 1rem 1rem 3rem;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.15); /* Depth logic */
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }

        input:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        input:focus {
            outline: none;
            border-color: var(--input-focus-border);
            background: rgba(99, 102, 241, 0.03);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15), inset 0 2px 4px rgba(0, 0, 0, 0.15);
        }

        input:focus + svg {
            color: var(--input-focus-border);
            transform: scale(1.1);
        }

        /* Label highlight effect */
        .form-group:focus-within label {
            color: #d4d4d8;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 1.15rem;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px -6px rgba(99, 102, 241, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.3);
            margin-top: 2.5rem;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.02em;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px -8px rgba(99, 102, 241, 0.9), inset 0 1px 1px rgba(255, 255, 255, 0.4);
        }

        button:hover:not(:disabled)::after {
            opacity: 1;
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 0 4px 12px -4px rgba(99, 102, 241, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: rgba(99, 102, 241, 0.4);
            box-shadow: none;
            border: 1px solid transparent;
            transform: none;
        }

        .spinner {
            display: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-container {
            margin-top: 2.5rem;
            padding: 1.75rem;
            border-radius: 20px;
            background: rgba(52, 211, 153, 0.1); /* Success green tint */
            border: 1px solid rgba(52, 211, 153, 0.25);
            text-align: center;
            display: none;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(52, 211, 153, 0.05);
        }

        .result-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        .result-container:hover::before { opacity: 1; }

        .result-container.error {
            background: rgba(248, 113, 113, 0.1);
            border-color: rgba(248, 113, 113, 0.25);
            box-shadow: inset 0 2px 10px rgba(248, 113, 113, 0.05);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.96) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .result-label {
            font-size: 0.8rem;
            color: var(--success);
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 800;
        }

        .result-value {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.03em;
        }

        .result-container.error .result-label {
            color: var(--error);
        }

        .result-container.error .result-value {
            color: var(--text-primary);
            font-size: 1.25rem;
            line-height: 1.5;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Premium Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <div class="card">
            <div class="header">
                <span class="badge">Machine Learning Engine</span>
                <h1>Iris Classification</h1>
                <p>Input flower measurements below to run inferences and identify species</p>
            </div>

            <form id="predictionForm" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="sepal_length">Sepal Length (cm)</label>
                        <div class="input-wrapper">
                            <input type="number" id="sepal_length" step="0.1" min="0" placeholder="e.g. 5.1" required>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                            </svg>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="sepal_width">Sepal Width (cm)</label>
                        <div class="input-wrapper">
                            <input type="number" id="sepal_width" step="0.1" min="0" placeholder="e.g. 3.5" required>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="petal_length">Petal Length (cm)</label>
                        <div class="input-wrapper">
                            <input type="number" id="petal_length" step="0.1" min="0" placeholder="e.g. 1.4" required>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
                            </svg>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="petal_width">Petal Width (cm)</label>
                        <div class="input-wrapper">
                            <input type="number" id="petal_width" step="0.1" min="0" placeholder="e.g. 0.2" required>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>
                    </div>
                </div>

                <button type="submit" id="predictBtn">
                    <div class="spinner" id="spinner"></div>
                    <span id="btnText">Execute Prediction</span>
                </button>
            </form>

            <div class="result-container" id="resultContainer">
                <div class="result-label" id="resultLabel">Result</div>
                <div class="result-value" id="resultValue">-</div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('predictBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            const resultContainer = document.getElementById('resultContainer');
            const resultLabel = document.getElementById('resultLabel');
            const resultValue = document.getElementById('resultValue');
            const inputs = document.querySelectorAll('input');

            // Collect and validate data
            const payload = {
                sepal_length: parseFloat(document.getElementById('sepal_length').value),
                sepal_width: parseFloat(document.getElementById('sepal_width').value),
                petal_length: parseFloat(document.getElementById('petal_length').value),
                petal_width: parseFloat(document.getElementById('petal_width').value)
            };

            for (const key in payload) {
                if (isNaN(payload[key]) || payload[key] <= 0) {
                    showResult('Validation Error', 'Please verify input measurements.', true);
                    
                    // Add shake animation to card for error feedback
                    const card = document.querySelector('.card');
                    card.style.animation = 'none';
                    card.offsetHeight; // force reflow
                    // Custom shake keyframes inline via JS
                    card.style.animation = 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both';
                    
                    if (!document.getElementById('shake-style')) {
                        const style = document.createElement('style');
                        style.id = 'shake-style';
                        style.innerHTML = `
                        @keyframes shake {
                          10%, 90% { transform: translate3d(-1px, 0, 0); }
                          20%, 80% { transform: translate3d(2px, 0, 0); }
                          30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
                          40%, 60% { transform: translate3d(4px, 0, 0); }
                        }`;
                        document.head.appendChild(style);
                    }
                    return;
                }
            }

            // Enter loading state
            btn.disabled = true;
            inputs.forEach(input => input.disabled = true);
            spinner.style.display = 'block';
            btnText.textContent = 'Processing Model...';
            resultContainer.style.display = 'none';

            try {
                // Execute API request
                const response = await fetch('https://automlops.onrender.com/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.class_name) {
                    showResult('Verified Identity', data.class_name, false);
                } else {
                    throw new Error('Unexpected response signature.');
                }
            } catch (error) {
                showResult('System Error', error.message.includes('API') ? error.message : 'Unable to reach machine learning API endpoint.', true);
            } finally {
                // Reset interaction state
                btn.disabled = false;
                inputs.forEach(input => input.disabled = false);
                spinner.style.display = 'none';
                btnText.textContent = 'Execute Prediction';
            }

            function showResult(label, value, isError) {
                resultContainer.className = 'result-container' + (isError ? ' error' : '');
                resultLabel.textContent = label;
                resultValue.textContent = value;
                
                // Reset animation
                resultContainer.style.animation = 'none';
                resultContainer.offsetHeight; // force reflow
                resultContainer.style.animation = 'scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                
                resultContainer.style.display = 'block';
            }
        });
    </script>
</body>
</html>
